<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Urgencias Pro v12.7 - Extractor</title>
    <style>
      :root {
        --primary: #2563eb;
        --secondary: #64748b;
        --danger: #d63031;
        --warning: #fdcb6e;
        --success: #00b894;
        --bg: #f1f5f9;
      }
      body {
        font-family: "Segoe UI", system-ui, sans-serif;
        margin: 0;
        background: var(--bg);
        color: #2d3436;
        min-width: 850px;
        min-height: 600px;
      }
      header {
        background: #1e293b;
        padding: 0.8rem 1.2rem;
        color: white;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .container {
        padding: 1rem;
      }
      .nav-steps {
        display: flex;
        gap: 8px;
        margin-bottom: 1rem;
        justify-content: center;
      }
      .step {
        padding: 0.5rem 1rem;
        border-radius: 8px;
        background: white;
        color: var(--secondary);
        font-weight: bold;
        cursor: pointer;
        border: 1px solid #e2e8f0;
        font-size: 0.75rem;
        transition: 0.2s;
      }
      .step.active {
        background: var(--primary);
        color: white;
        border-color: var(--primary);
      }
      .page {
        display: none;
      }
      .page.active {
        display: block;
      }
      .card {
        background: white;
        padding: 1rem;
        border-radius: 12px;
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
      }
      .btn {
        padding: 0.5rem 1rem;
        border-radius: 8px;
        border: none;
        font-weight: 600;
        cursor: pointer;
        transition: 0.2s;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-size: 0.75rem;
      }
      .btn-primary {
        background: var(--primary);
        color: white;
      }
      .btn-success {
        background: var(--success);
        color: white;
      }
      .btn-ghost {
        background: #f8fafc;
        color: var(--secondary);
        border: 1px solid #e2e8f0;
      }
      .db-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.7rem;
        margin-top: 0.5rem;
      }
      .db-table th {
        background: #f8fafc;
        padding: 6px;
        border-bottom: 2px solid #e2e8f0;
        text-align: center;
      }
      .db-table td {
        padding: 4px;
        border-bottom: 1px solid #f1f5f9;
        text-align: center;
      }
      .res-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.65rem;
        table-layout: fixed;
        border: 1px solid #333;
      }
      .res-table th {
        background: #1e293b;
        color: white;
        padding: 4px;
        border: 1px solid #333;
        font-size: 0.55rem;
      }
      .res-table td {
        border: 1px solid #333;
        padding: 3px;
        text-align: center;
        background: white;
        vertical-align: top;
      }
      .dia-col {
        background: #1e293b !important;
        color: white;
        font-weight: bold;
        width: 25px;
      }
      .num-col {
        background: #f8fafc;
        width: 18px;
      }
      .alert-skill {
        color: var(--danger);
        font-weight: bold;
        display: block;
        font-size: 0.55rem;
      }
      .task-box {
        background: #fff3cd;
        border: 1px solid #ffeeba;
        padding: 3px;
        border-radius: 4px;
        font-size: 0.55rem;
        color: #856404;
        margin-top: 2px;
      }
      .rotation-box {
        border-top: 1px dashed #bbb;
        margin-top: 3px;
        padding-top: 3px;
        background: #fdfdfd;
      }
      .time-mark {
        font-size: 6px;
        color: var(--primary);
        font-weight: bold;
        display: block;
        margin-bottom: 2px;
      }
      @media print {
        body {
          background: white;
        }
        .no-print,
        header,
        .nav-steps,
        #setupZone,
        .btn-ghost {
          display: none !important;
        }
        .container {
          padding: 0;
          margin: 0;
        }
        .card {
          box-shadow: none;
          padding: 0;
        }
        .res-table {
          font-size: 6px;
        }
      }
    </style>
  </head>
  <body>
    <header class="no-print">
      <div style="display: flex; align-items: center; gap: 8px">
        <span style="font-size: 1.2rem">🏥</span>
        <h2 style="margin: 0; font-size: 0.9rem">Urgencias Pro v12.7</h2>
      </div>
      <button class="btn btn-success" id="btnSinc">
        ⚡ Importar de aTurnos
      </button>
    </header>

    <div class="container">
      <div class="nav-steps no-print">
        <div id="step1" class="step active">1. Mi Plantilla</div>
        <div id="step2" class="step">2. Generar Distribución</div>
      </div>

      <div id="page-staff" class="page active">
        <div class="card">
          <div
            style="
              display: flex;
              justify-content: space-between;
              align-items: center;
            "
          >
            <h3 style="margin: 0; font-size: 1rem">Libro de Personal</h3>
            <div id="status" style="font-size: 0.6rem; color: var(--secondary)">
              Datos sincronizados
            </div>
          </div>
          <table class="db-table">
            <thead>
              <tr>
                <th style="text-align: left">ENFERMERO/A</th>
                <th>ESP PED</th>
                <th>EXP PED</th>
                <th>EXP URG</th>
                <th>FORM TRJ</th>
                <th>FIJO</th>
                <th>ROTAR</th>
              </tr>
            </thead>
            <tbody id="dbBody"></tbody>
          </table>
        </div>
      </div>

      <div id="page-gen" class="page">
        <div class="card">
          <div
            id="setupZone"
            style="text-align: center; padding: 1rem"
            class="no-print"
          >
            <p style="font-size: 0.9rem">Mes cargado: <b id="mesLabel">-</b></p>
            <button class="btn btn-primary" id="btnGenerar">
              Generar Cuadrante
            </button>
          </div>
          <div id="resultZone" style="display: none">
            <div
              style="
                display: flex;
                justify-content: space-between;
                margin-bottom: 1rem;
                align-items: center;
              "
              class="no-print"
            >
              <select
                id="turnoSel"
                style="
                  padding: 6px;
                  border-radius: 6px;
                  font-weight: bold;
                  border: 1px solid #ddd;
                "
              >
                <option value="DIURNO">MAÑANA / TARDE</option>
                <option value="NOCHE">TURNO NOCHE</option>
              </select>
              <button class="btn btn-ghost" id="btnImprimir">
                🖨️ Imprimir
              </button>
            </div>
            <div id="tablaDiv"></div>
          </div>
        </div>
      </div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
